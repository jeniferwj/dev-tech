<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>DevTech - Cadastro</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        .btnc:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Início</a>
    <a href="cadastro.html">Cadastro</a>
    <a href="eventos.html">Eventos</a>
</nav>

<section class="hero hero-geral">
    <div class="hero-text">
        <h1>Inscrição para o Evento</h1>

        <div class="info">
            <div class="info-item">
                <span class="icone"><i class="fas fa-calendar-alt"></i></span>
                23/07/2026
            </div>

            <div class="info-item">
                <span class="icone"><i class="fas fa-map-marker-alt"></i></span>
                Teatro Colégio Londrinense - Londrina/PR
            </div>
        </div>
    </div>
</section>

<div class="form-container">
    <p>Preencha o formulário abaixo para garantir sua participação no evento DevTech.</p>

    <form id="formCadastro">

    <label>Nome completo:</label>
    <input type="text" name="nome" required>

    <label>Email:</label>
    <input type="email" name="email" required>

    <label>CPF:</label>
    <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" required>

    <label>Telefone:</label>
    <input type="tel" name="telefone" id="telefone" placeholder="(00) 00000-0000">

    <label>Data de nascimento:</label>
    <input type="date" name="nascimento">

    <label>Área de atuação:</label>
    <select name="area">
        <option value="Estudante">Estudante</option>
        <option value="Desenvolvedor">Desenvolvedor</option>
        <option value="Profissional de TI">Profissional de TI</option>
        <option value="Empreendedor">Empreendedor</option>
        <option value="Outro">Outro</option>
    </select>

    <label>Interesse:</label>
    <div class="grupo">
        <label><input type="radio" name="interesse" value="IA" required> IA</label>
        <label><input type="radio" name="interesse" value="Mobile"> Mobile</label>
        <label><input type="radio" name="interesse" value="Ambos"> Ambos</label>
    </div>

    <label>Como ficou sabendo?</label>
    <div class="grupo">
        <label><input type="checkbox" name="origem[]" value="instagram"> Instagram</label>
        <label><input type="checkbox" name="origem[]" value="faculdade"> Faculdade</label>
        <label><input type="checkbox" name="origem[]" value="amigos"> Amigos</label>
        <label><input type="checkbox" name="origem[]" value="internet"> Internet</label>
        <label><input type="checkbox" id="outrosCheck" value="outros"> Outros</label>
    </div>

    <input type="text" id="outrosTexto" name="outrosTexto" placeholder="Digite aqui" disabled>

    <label>Mensagem:</label>
    <textarea name="mensagem"></textarea>

    <button type="submit" id="btnEnviar">Confirmar Inscrição</button>

</form>
</div>

<footer>
    © 2026 DevTech
</footer>



</body>
</html>
