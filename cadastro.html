<body>

<nav>
    <a href="index.html">Início</a>

<div class="form-container">

    <h1>Inscrição no Evento</h1>

    <p class="info-evento">
        <strong>📅 Data:</strong> 23/07/2026 <br>
        <strong>📍 Local:</strong> Teatro Colégio Londrinense - Londrina/PR
    </p>

    <p>Preencha o formulário abaixo para garantir sua participação no evento DevTech.</p>

    <form>

        <label>Nome completo:</label>
        <input type="text" name="nome" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Telefone:</label>
        <input type="tel" name="telefone">

        <label>Data de nascimento:</label>
        <input type="date" name="nascimento">

        <label>Área de atuação:</label>
        <select name="area">
            <option>Estudante</option>
            <option>Desenvolvedor</option>
            <option>Profissional de TI</option>
            <option>Empreendedor</option>
            <option>Outro</option>
        </select>

        <label>Qual atividade você tem mais interesse?</label>
        <div class="grupo">
            <label><input type="radio" name="interesse"> Palestras sobre IA</label>
            <label><input type="radio" name="interesse"> Workshop Mobile</label>
            <label><input type="radio" name="interesse"> Ambos</label>
        </div>

        <label>Como ficou sabendo do evento?</label>
        <div class="grupo">
            <label><input type="checkbox"> Instagram</label>
            <label><input type="checkbox"> Faculdade / Escola</label>
            <label><input type="checkbox"> Amigos</label>
            <label><input type="checkbox"> Internet</label>
        </div>

        <label>Observações ou expectativas:</label>
        <textarea name="mensagem" rows="4"></textarea>

        <input type="submit" value="Confirmar inscrição" class="btn">

    </form>

</div>

</body>
</html>
