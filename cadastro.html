<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>DevTech - Cadastro</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <nav>
      <a href="index.html">Início</a>
      <a href="cadastro.html">Cadastro</a>
      <a href="eventos.html">Eventos</a>
  </nav>

  <section class="hero hero-geral">
    <div class="hero-text">
      <h1>Inscrição para o Evento</h1>

      <div class="info">
        <div class="info-item">
          <span class="icone"><i class="fas fa-calendar-alt"></i></span>
          23/07/2026
        </div>

        <div class="info-item">
          <span class="icone"><i class="fas fa-map-marker-alt"></i></span>
          Teatro Colégio Londrinense - Londrina/PR
        </div>

      </div>
    </div>
  </section>

  <div class="form-container">
    <p>Preencha o formulário abaixo para garantir sua participação no evento DevTech.</p>

    <form>
        <label>Nome completo:</label>
        <input type="text" name="nome" required>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Telefone:</label>
        <input type="tel" name="telefone">

        <label>Data de nascimento:</label>
        <input type="date" name="nascimento">

        <label>Área de atuação:</label>
        <select name="area">
            <option>Estudante</option>
            <option>Desenvolvedor</option>
            <option>Profissional de TI</option>
            <option>Empreendedor</option>
            <option>Outro</option>
        </select>

        <label>Qual atividade você tem mais interesse?</label>
        <div class="grupo">
            <label><input type="radio" name="interesse"> Palestras sobre IA</label>
            <label><input type="radio" name="interesse"> Workshop Mobile</label>
            <label><input type="radio" name="interesse"> Ambos</label>
        </div>

        <label>Como ficou sabendo do evento?</label>
        <div class="grupo">
            <label><input type="checkbox"> Instagram</label>
            <label><input type="checkbox"> Faculdade / Escola</label>
            <label><input type="checkbox"> Amigos</label>
            <label><input type="checkbox"> Internet</label>
        </div>

        <label>Observações ou expectativas:</label>
        <textarea name="mensagem" rows="4"></textarea>

        <button onclick="mensagem()" type="submit">"Confirmar inscrição"</button>

    </form>
  </div>

  <footer>
    © 2026 DevTech
  </footer>

</body>
</html>
